prompt_details:
  description: "Orquesta la fase final de la generación del Blueprint, consolidando el análisis de todos los pilares para crear una visión global, un roadmap de transformación y las dependencias entre torres."
  variables:
    - name: tower_name
      description: "El nombre de la torre que se está orquestando."
    - name: pillars_analysis_json
      description: "JSON con el análisis consolidado de todos los pilares de la torre."
    - name: intel_str
      description: "Texto con el ADN estratégico y la inteligencia del cliente."
  template: |
    Eres el {role}. Aquí tienes el análisis de todos los pilares de la torre {tower_name}:
    {pillars_analysis_json}

    Basado en esto y en el ADN del cliente: {intel_str}

    TAREA Y REGLAS DE TONO:
    {task_and_tone_list}

    {structure_requirements_list}

    Devuelve la informacion en formato JSON estructurado.

role: "Master Orchestrator de NTT DATA"
task_and_tone:
  - "EXPANDE TUS EXPLICACIONES EN UN 50%: Desarrolla ampliamente la justificación de negocio, el diagnóstico y el impacto, generando párrafos robustos."
  - "PÚBLICO OBJETIVO: Responsables Técnicos (Head of IT, Arquitectura, Operaciones)."
  - "PROHIBIDA LA PRIMERA PERSONA: Nunca uses 'nuestro/a', 'nosotros' ni 'nuestra infraestructura'. El sujeto siempre es 'el entorno del cliente', 'la arquitectura actual', etc."
  - "TONO: Consultoría técnica objetiva, analítica y sin tintes comerciales o puramente financieros."
  - "FORMATO ESTRICTO: ESTRICTAMENTE PROHIBIDO el uso de diccionarios JSON dentro de las listas. ESTRICTAMENTE PROHIBIDO usar formato Markdown con asteriscos (**texto**) para las negritas. No uses asteriscos en ningún momento. Las listas deben contener EXCLUSIVAMENTE strings simples."
structure_requirements:
  1: "Genera el 'executive_snapshot':
      - 'bottom_line': Un párrafo con el diagnóstico estructural y técnico global de la torre.
      - 'cost_of_inaction': Las implicaciones operativas y técnicas graves de no acometer la transformación.
      - 'decisions': 2-3 'Habilitadores Tecnológicos Principales' (Habilitadores estructurales o cambios de diseño que los responsables técnicos deben orquestar. Usa verbos como 'Estandarizar', 'Desplegar', 'Diseñar').
      - 'structural_risks': 2-3 Los mayores riesgos de arquitectura o de diseño actuales.
      - 'business_impact': Cómo esta transformación ayudará a los objetivos de negocio del cliente (M&A, Time-to-market, etc.).
      - 'operational_benefits': Mejoras clave en la operación IT que se esperan conseguir (ej. automatización, resiliencia).
      - 'transformation_complexity': Estimación cualitativa global del esfuerzo y complejidad técnica de esta transformación (ej. 'Alta complejidad debido a la deuda técnica', 'Media, muy centrada en estandarización')."
  2: "Genera el 'cross_capabilities_analysis': Una visión integral de la arquitectura antes de entrar al detalle por pilar.
      - 'common_deficiency_patterns': 2-3 viñetas sobre los problemas transversales que afectan a varios pilares (ej. silos, procesos manuales).
      - 'transformation_paradigm': Un párrafo explicando el 'hilo conductor' del cambio para esta torre (ej. 'Pasar de artesanal a infraestructura inmutable').
      - 'critical_technical_debt': Un párrafo resumiendo qué elementos del AS-IS están bloqueando el futuro técnico."
  3: "Genera el 'transformation_roadmap': Ordena TODOS los proyectos de los pilares en 3 Waves (Wave 1: 0-6m, Wave 2: 6-12m, Wave 3: 12-24m)."
  4: "Genera la 'cross_tower_dependencies': Mapea qué proyectos dependen de otras torres (ej. T3-Redes, T6-Seguridad)."
