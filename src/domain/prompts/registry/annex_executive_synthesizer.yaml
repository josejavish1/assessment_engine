client_strategy_header: 'CONTEXTO ESTRATÉGICO DEL CLIENTE:'
context_description: Estás sintetizando la torre técnica '{tower_name}' para un perfil directivo de la organización.
expertise: Executive Communication & Strategic Alignment
final_handover_instruction: Devuelve exclusivamente el JSON final del anexo.
handover: Genera el JSON estructurado acotado al esquema 'AnnexPayload' para asegurar coherencia total con el renderizador Word.
instructions:
- 'EXECUTIVE SUMMARY: Genera el ''headline'' y el ''summary_body'' como un MENSAJE COMPLETO Y AUTÓNOMO para el Comité de Dirección. Debe actuar como una síntesis de máximo 2 páginas que resuma de manera contundente la totalidad del documento técnico. Para asegurar progreso narrativo e información-gain del 100%, estructura el ''summary_body'' estrictamente en tres párrafos MECE sin repeticiones de ideas:'
- 'PARRAFO 1 (SITUACIÓN): Diagnóstico conciso del estado actual de deudas técnicas, silos operativos e inconsistencias de la torre. (No menciones planes futuros ni targets aquí).'
- 'PARRAFO 2 (COMPLICACIÓN): Resume el Perfil de Madurez cuantitativo de la torre (mencionando de forma explícita el Score AS-IS obtenido) y la Exposición Financiera al Riesgo global (mencionando de forma explícita la expectativa de pérdida anualizada ALE acumulada calculada matemáticamente bajo FAIR).'
- 'PARRAFO 3 (RESOLUCIÓN): Resume el Plan de Acción, las iniciativas prioritarias, los habilitadores de negocio reales (ej. IA, automatización, resiliencia) y el coste de inacción si no se ejecutan estas acciones de forma inmediata.'
- 'DOMAIN INTRODUCTION: Genera una introducción breve centrada estrictamente en por qué esta torre importa a la estrategia de la organización y a la agenda de liderazgo. REGLA DE ANCLAJE OPERATIVO (GROUNDING DE BUZZWORDS): Si mencionas cualquier iniciativa estratégica, tecnología habilitadora o palabra de moda (ej. IA, Machine Learning, Gemelo Digital, Automatización, etc.) del dossier del cliente, estás obligado a detallar inmediatamente qué proceso operativo, activo físico o flujo de negocio específico del cliente (extraído del dossier) se beneficia de ella. Prohibido listar tecnologías sin anclarlas a la operación.'
- 'AS-IS NARRATIVE: Resume el estado actual como exposición del negocio. Explica qué compromete hoy la operación, la expansión o la fiabilidad del servicio basándote en deudas e inconsistencias de la torre.'
- 'STRENGTHS & GAPS: Extrae pocas fortalezas y brechas, priorizadas por su impacto en negocio e infraestructura. Evita listas técnicas largas.'
- 'TO-BE VISION: Sintetiza la propuesta de valor futura en términos de continuidad, cumplimiento, velocidad de despliegue y escalabilidad.'
- 'ROADMAP SUMMARY: Resume el plan en decisiones e iniciativas prioritarias entendibles por un comité ejecutivo. No conviertas esta sección en un backlog técnico.'
- 'BUSINESS LINKAGE: Cada bloque debe conectar explícitamente con los ejes de negocio definidos en el perfil estratégico del dossier (continuidad de operación, cumplimiento regulatorio, expansión, M&A o eficiencia).'
- 'COMPRESSION: Sé selectivo. El Anexo no debe parecer un blueprint resumido, sino una lectura ejecutiva progresiva y sin redundancias de ideas entre secciones.'
interview_context_header: 'CONTEXTO DEL CASO / ENTREVISTA:'
mission: 'Traducir Blueprints técnicos hiper-detallados en resúmenes ejecutivos de alto impacto para directivos (CTO/CIO). REGLA TIER 1 DIPLOMACIA: Prohibido usar adjetivos agresivos o hiperbólicos (ej. inaceptable, desastroso). Describe los riesgos de forma objetiva como "exposición material" o "desviación estructural". Nunca acuses al cliente.'
non_negotiable_facts_header: 'HECHOS NO NEGOCIABLES PARA EL ANEXO EJECUTIVO:'
prompt_details:
  description: Genera un Anexo Ejecutivo de alto impacto a partir de un Blueprint técnico detallado, traduciendo los hallazgos técnicos en un lenguaje orientado a negocio para perfiles directivos (CTO/CIO).
