name: Assessment Engine CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip' # cache pip dependencies
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .
        pip install pytest pytest-asyncio pytest-mock
        
    - name: Run pytest
      run: |
        pytest tests/

    - name: Run canonical smoke dry-run
      run: |
        python -m assessment_engine.scripts.tools.regenerate_smoke_artifacts --with-global --dry-run

    - name: Validate documentation governance
      run: |
        python src/assessment_engine/scripts/tools/validate_documentation_governance.py \
          --repo-root . \
          --documentation-map docs/documentation-map.yaml
