name: Agent Evals (ELD)

on:
  schedule:
    - cron: '0 2 * * *' # Nightly
  pull_request:
    paths:
      - 'src/assessment_engine/scripts/tools/run_product_owner_orchestrator.py'
      - 'src/assessment_engine/prompts/**'
      - 'src/assessment_engine/schemas/**'
      - 'tests/agent_evals/**'

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          
      - name: Run Agent Evals
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_GENAI_USE_VERTEXAI: "0"
          GOOGLE_GENAI_USE_GCA: "0"
          GOOGLE_CLOUD_PROJECT: "sub403o4u0q5"
          GOOGLE_CLOUD_LOCATION: "europe-west1"
        run: |
          python tests/agent_evals/run_evals.py
