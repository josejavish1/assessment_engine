name: Incremental Quality Gate

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run incremental quality gate
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python src/assessment_engine/scripts/tools/run_incremental_quality_gate.py \
            --repo-root . \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA"

      - name: Architectural Fitness Function (Golden Paths)
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python src/assessment_engine/scripts/tools/run_golden_path_check.py \
            --repo-root . \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA"
