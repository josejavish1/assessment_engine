name: Documentation Governance

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  schedule:
    - cron: "23 4 * * *"

jobs:
  docs-governance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validator dependency
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt libcst ruff

      - name: Run documentation governance tests
        run: |
          python -m pytest tests/test_validate_documentation_governance.py -q

      - name: Validate documentation governance
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python src/assessment_engine/application/tools/validate_documentation_governance.py \
            --repo-root . \
            --documentation-map docs/documentation-map.yaml \
            --today "$(date -u +%F)" \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA"

      - name: Validate external documentation links
        if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
        run: |
          python src/assessment_engine/application/tools/validate_documentation_governance.py \
            --repo-root . \
            --documentation-map docs/documentation-map.yaml \
            --today "$(date -u +%F)" \
            --check-external-links

      - name: Validate documentation snippets
        run: |
          python src/assessment_engine/application/tools/validate_documentation_snippets.py \
            --repo-root . \
            --documentation-map docs/documentation-map.yaml

      - name: Run Nightly Self-Healing & Decay Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python src/assessment_engine/application/tools/nightly_self_healing.py \
            --repo-root . \
            --documentation-map docs/documentation-map.yaml

      - name: Lint documentation style
        run: |
          python src/assessment_engine/application/tools/lint_documentation_style.py \
            --repo-root . \
            --documentation-map docs/documentation-map.yaml

      - name: Build documentation health report
        run: |
          mkdir -p .artifacts/docs
          python src/assessment_engine/application/tools/build_documentation_health_report.py \
            --repo-root . \
            --documentation-map docs/documentation-map.yaml \
            --today "$(date -u +%F)" \
            --output .artifacts/docs/health-report.json

      - name: Build documentation preview
        run: |
          python src/assessment_engine/application/tools/build_docs_site.py \
            --repo-root . \
            --documentation-map docs/documentation-map.yaml \
            --output-dir .artifacts/docs/site

      - name: Upload documentation health report
        uses: actions/upload-artifact@v4
        with:
          name: documentation-health-report
          path: |
            .artifacts/docs/health-report.json
            .artifacts/docs/health-report.md

      - name: Upload documentation preview
        uses: actions/upload-artifact@v4
        with:
          name: documentation-preview
          path: .artifacts/docs/site

      - name: Language Compliance & Quality Gate
        run: |
          # 1. Validate docstrings, TODOs, and commented-out code using Ruff (respects pyproject.toml)
          ruff check src/

          # 2. Validate that 100% of source comments and descriptions are in Tier 1 English
          python scripts/enforce_english_comments.py $(find src/ -name "*.py" | grep -v "_legacy")

      - name: Automated Comment Formatting & Style Linter
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          python scripts/semantic_comment_linter.py

      - name: Commit and Push Autocurado (Self-Healing Push-Back)
        if: github.event_name == 'schedule' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
        run: |
          git config --global user.name "Apex Documentation Bot"
          git config --global user.email "doc-bot@assessment-engine.local"
          git add docs/ docs/documentation-map.yaml AGENTS.md CHATGPT.md GEMINI.md README.md .github/copilot-instructions.md
          if ! git diff --staged --quiet; then
            git commit -m "docs(chore): automated nightly self-healing and documentation decay [skip ci]"
            git push origin HEAD:${{ github.ref }}
          fi
