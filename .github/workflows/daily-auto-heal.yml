name: Daily Sentinel Auto-Heal

on:
  schedule:
    - cron: '0 0 * * *' # Run every day at midnight UTC
  workflow_dispatch: # Allow manual triggers from the GitHub Actions UI

permissions:
  contents: write # Requires write permissions to push auto-healed commits back to main

jobs:
  auto-heal:
    name: Repository Sync & Format Auto-Heal
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Package and Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run Context Compilation (llms-full.txt)
        run: |
          python src/assessment_engine/application/tools/compile_llms_full.py

      - name: Run Linter & Formatter Auto-Fixes (Ruff)
        run: |
          pip install ruff
          ruff check . --fix || echo "Some non-fixable warnings ignored."
          ruff format .

      - name: Check for Code & Docs Drift
        id: git-diff
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "drift=true" >> $GITHUB_OUTPUT
          else
            echo "drift=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit & Push Auto-Heal Modifications
        if: steps.git-diff.outputs.drift == 'true'
        run: |
          git config --global user.name "Sovereign Sentinel Bot"
          git config --global user.email "sentinel@sovereign-fabric.ai"
          git add .
          git commit -m "style: [Sentinel Auto-Heal] Synchronise llms-full.txt and format code"
          git push origin main

      - name: Validate System-wide Stability (pytest)
        run: |
          python -m pytest
