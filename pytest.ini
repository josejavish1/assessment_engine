[pytest]
testpaths = tests
norecursedirs = .git _PROJECT_ARCHIVE_ _legacy .venv working
addopts = -ra -q
markers =
    contract: marks tests that validate data contracts between pipeline stages

filterwarnings =
    # Ignore the experimental warning from google-adk
    ignore::UserWarning:google.adk.features._feature_decorator
    # Ignore the deprecation warning from vertexai
    ignore:This feature is deprecated as of June 24, 2025:UserWarning:vertexai.generative_models._generative_models
