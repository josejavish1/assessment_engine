automation_rules:
- name: architecture-changes
  when_changed:
  - src/assessment_engine/application/**
  - src/assessment_engine/mcp_server.py
  require_review_of:
  - docs/SYSTEM_ARCHITECTURE.md
  - docs/architecture
  - docs/README.md
  - GEMINI.md
  - AGENTS.md
- name: schema-contract-changes
  when_changed:
  - src/assessment_engine/domain/schemas/**
  - tests/test_contract_handover.py
  require_review_of:
  - docs/contracts
  - docs/README.md
  - docs/architecture
- name: runtime-validation-changes
  when_changed:
  - pyproject.toml
  - requirements.txt
  - .github/workflows/**
  require_review_of:
  - README.md
  - docs/README.md
  - docs/ai/documentation-governance.md
  - docs/operations
- name: docs-governance-changes
  when_changed:
  - .github/pull_request_template.md
  - .github/CODEOWNERS
  - .github/workflows/docs-governance.yml
  - src/assessment_engine/application/tools/validate_documentation_governance.py
  require_review_of:
  - docs/ai/documentation-governance.md
  - docs/README.md
  - docs/documentation-map.yaml
- name: governance-adapter-changes
  when_changed:
  - AGENTS.md
  - CHATGPT.md
  - .github/copilot-instructions.md
  - GEMINI.md
  require_review_of:
  - docs/ai/documentation-governance.md
  - docs/README.md
coverage:
  include:
  - README.md
  - AGENTS.md
  - CHATGPT.md
  - GEMINI.md
  - .github/copilot-instructions.md
  - templates/golden_paths/README.md
  - docs/**/*.md
  exclude:
  - docs/reference/generated/legacy-gemini/**
  - docs/strategy/**
freshness:
  verified_max_age_days: 120
