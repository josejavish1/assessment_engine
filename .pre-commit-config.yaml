exclude: "^mutants/|^working/|^.venv/|^business_command_center/node_modules/|^_PROJECT_ARCHIVE_/"
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-ast

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
    -   id: mypy
        files: \.py$
        args: [--strict, --ignore-missing-imports, --explicit-package-bases]
        additional_dependencies: ["pydantic", "types-PyYAML", "types-requests", "pytest", "pytest-asyncio"]

  - repo: https://github.com/returntocorp/semgrep
    rev: v1.163.0
    hooks:
      - id: semgrep
        args: ['--config', 'p/python', '--error']

  - repo: local
    hooks:
#      - id: zero-lockin-guard
#        name: Prove Zero Vendor Lock-in (Portability Audit)
#        entry: bash -c "bin/prove-zero-lockin"
#        language: system
#        pass_filenames: false

      - id: ast-shield
        name: AST Architecture Topology Guard
        entry: bash -c "SOV_PATH=\"$HOME/sovereign_fabric\"; [ ! -d \"$SOV_PATH\" ] && SOV_PATH=\"../sovereign_fabric\"; source \"$SOV_PATH/.venv/bin/activate\" && PYTHONPATH=\"$SOV_PATH/src\" python \"$SOV_PATH/src/core/governance/architecture_topology_validator.py\" --repo-root ."
        language: system
        pass_filenames: false

      - id: golden-path
        name: Golden Path Checker
        entry: bash -c "SOV_PATH=\"$HOME/sovereign_fabric\"; [ ! -d \"$SOV_PATH\" ] && SOV_PATH=\"../sovereign_fabric\"; source \"$SOV_PATH/.venv/bin/activate\" && PYTHONPATH=\"$SOV_PATH/src\" python \"$SOV_PATH/src/core/agents/product_owner/golden_path_radar_agent.py\" --repo-root . --report-only"
        language: system
        pass_filenames: false

      - id: security-posture
        name: Security Posture Guard
        entry: bash -c "SOV_PATH=\"$HOME/sovereign_fabric\"; [ ! -d \"$SOV_PATH\" ] && SOV_PATH=\"../sovereign_fabric\"; source \"$SOV_PATH/.venv/bin/activate\" && PYTHONPATH=\"$SOV_PATH/src\" python \"$SOV_PATH/src/core/governance/security_posture_validator.py\" --repo-root ."
        language: system
        pass_filenames: false

#      - id: docs-governance
#        name: Documentation Governance Link Checker
#        entry: bash -c "SOV_PATH=\"$HOME/sovereign_fabric\"; [ ! -d \"$SOV_PATH\" ] && SOV_PATH=\"../sovereign_fabric\"; source \"$SOV_PATH/.venv/bin/activate\" && PYTHONPATH=\"$SOV_PATH/src\" python \"$SOV_PATH/src/core/governance/documentation_governance_validator.py\" --repo-root . --documentation-map docs/documentation-map.yaml"
#        language: system
#        pass_filenames: false

#      - id: change-discipline
#        name: Change Discipline & Blast Radius Guard
#        entry: bash -c "SOV_PATH=\"$HOME/sovereign_fabric\"; [ ! -d \"$SOV_PATH\" ] && SOV_PATH=\"../sovereign_fabric\"; source \"$SOV_PATH/.venv/bin/activate\" && PYTHONPATH=\"$SOV_PATH/src\" python \"$SOV_PATH/src/core/governance/change_discipline_validator.py\" --repo-root . --request-dir .github/change-plan"
#        language: system
#        pass_filenames: false

      - id: docs-language-guard
        name: Docs & Comments Language Guard (Technical English Only)
        entry: .venv/bin/python src/assessment_engine/application/tools/enforce_english_comments.py
        language: system
        files: \.py$

      - id: docs-auto-healing
        name: Documentation Contracts Auto-Healing
        entry: .venv/bin/python src/assessment_engine/application/tools/validate_contracts_schemas.py --repo-root . --documentation-map docs/documentation-map.yaml --autofix
        language: system
        pass_filenames: false
